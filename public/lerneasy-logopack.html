<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LernEasy — Logo Pack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: #f1f5f9;
    padding: 48px 32px;
    color: #0f172a;
  }
  h1 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 48px;
  }
  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 12px;
    margin-top: 36px;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    padding: 24px 32px;
    border: 1px solid #e2e8f0;
  }
  .tile.white-bg  { background: #ffffff; }
  .tile.dark-bg   { background: #0f172a; border-color: #1e293b; }
  .tile.blue-bg   { background: #2563eb; border-color: #1d4ed8; }
  .tile.check     { background-image: repeating-conic-gradient(#d1d5db 0% 25%, transparent 0% 50%); background-size: 16px 16px; background-color: #fff; }
  .tile.check-dark{ background-image: repeating-conic-gradient(#334155 0% 25%, #1e293b 0% 50%); background-size: 16px 16px; }
  .tile.icon      { padding: 12px; }
  hr { border: none; border-top: 1px solid #e2e8f0; margin: 48px 0 8px; }
  footer { font-size: 11px; color: #cbd5e1; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>

<h1>LernEasy · Logo Pack</h1>

<!-- WORDMARK: Black -->
<p class="label">Wordmark · Black</p>
<div class="row">
  <div class="tile check">
    <svg viewBox="0 0 340 68" width="340" height="68" xmlns="http://www.w3.org/2000/svg">
      <text x="8" y="54" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="56" fill="#0f0f0f" letter-spacing="-1">LernEasy</text>
    </svg>
  </div>
</div>

<!-- WORDMARK: White -->
<p class="label">Wordmark · White</p>
<div class="row">
  <div class="tile check-dark">
    <svg viewBox="0 0 340 68" width="340" height="68" xmlns="http://www.w3.org/2000/svg">
      <text x="8" y="54" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="56" fill="#ffffff" letter-spacing="-1">LernEasy</text>
    </svg>
  </div>
</div>

<!-- WORDMARK: On Blue bg -->
<p class="label">Wordmark · Blue 600 Background</p>
<div class="row">
  <div class="tile blue-bg">
    <svg viewBox="0 0 340 68" width="340" height="68" xmlns="http://www.w3.org/2000/svg">
      <text x="8" y="54" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="56" fill="#ffffff" letter-spacing="-1">LernEasy</text>
    </svg>
  </div>
</div>

<!-- WORDMARK: Blue text on white -->
<p class="label">Wordmark · Blue on White</p>
<div class="row">
  <div class="tile white-bg">
    <svg viewBox="0 0 340 68" width="340" height="68" xmlns="http://www.w3.org/2000/svg">
      <text x="8" y="54" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="56" fill="#2563eb" letter-spacing="-1">LernEasy</text>
    </svg>
  </div>
</div>

<!-- ICONS -->
<p class="label">Icon · LE Monogram</p>
<div class="row">

  <!-- Black transparent -->
  <div class="tile check icon">
    <svg viewBox="0 0 72 76" width="72" height="76" xmlns="http://www.w3.org/2000/svg">
      <text x="3" y="66" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="66" fill="#0f0f0f" letter-spacing="-5">LE</text>
    </svg>
  </div>

  <!-- White transparent -->
  <div class="tile check-dark icon">
    <svg viewBox="0 0 72 76" width="72" height="76" xmlns="http://www.w3.org/2000/svg">
      <text x="3" y="66" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="66" fill="#ffffff" letter-spacing="-5">LE</text>
    </svg>
  </div>

  <!-- Blue square -->
  <div class="tile check icon">
    <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="80" rx="14" fill="#2563eb"/>
      <text x="5" y="68" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-5">LE</text>
    </svg>
  </div>

  <!-- Dark square -->
  <div class="tile check icon">
    <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="80" rx="14" fill="#0f172a"/>
      <text x="5" y="68" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-5">LE</text>
    </svg>
  </div>

  <!-- White square, blue text -->
  <div class="tile check icon">
    <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="80" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="5" y="68" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="64" fill="#2563eb" letter-spacing="-5">LE</text>
    </svg>
  </div>

</div>

<!-- HERO: Light -->
<p class="label">Hero · Slogan · Light</p>
<div class="row">
  <div class="tile white-bg" style="padding:0;border-radius:16px;overflow:hidden;">
    <svg viewBox="0 0 480 148" width="480" height="148" xmlns="http://www.w3.org/2000/svg">
      <rect width="480" height="148" fill="#ffffff"/>
      <text x="32" y="78" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="64" fill="#0f172a" letter-spacing="-2">LernEasy</text>
      <text x="34" y="118" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="400" font-size="17" fill="#94a3b8" letter-spacing="0.2">Wo lernen vorprogrammiert ist</text>
    </svg>
  </div>
</div>

<!-- HERO: Dark -->
<p class="label">Hero · Slogan · Dark</p>
<div class="row">
  <div class="tile dark-bg" style="padding:0;border-radius:16px;overflow:hidden;">
    <svg viewBox="0 0 480 148" width="480" height="148" xmlns="http://www.w3.org/2000/svg">
      <rect width="480" height="148" fill="#0f172a"/>
      <text x="32" y="78" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="64" fill="#f8fafc" letter-spacing="-2">LernEasy</text>
      <text x="34" y="118" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="400" font-size="17" fill="#475569" letter-spacing="0.2">Wo lernen vorprogrammiert ist</text>
    </svg>
  </div>
</div>

<!-- HERO: Blue -->
<p class="label">Hero · Slogan · Blue 600</p>
<div class="row">
  <div class="tile blue-bg" style="padding:0;border-radius:16px;overflow:hidden;">
    <svg viewBox="0 0 480 148" width="480" height="148" xmlns="http://www.w3.org/2000/svg">
      <rect width="480" height="148" fill="#2563eb"/>
      <text x="32" y="78" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-2">LernEasy</text>
      <text x="34" y="118" font-family="'Syne','Trebuchet MS',sans-serif" font-weight="400" font-size="17" fill="#bfdbfe" letter-spacing="0.2">Wo lernen vorprogrammiert ist</text>
    </svg>
  </div>
</div>

<hr>
<footer>LernEasy · Brand Identity · SVG Logo Pack</footer>

</body>
</html>
